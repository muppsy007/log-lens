<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>log-lens</title>

  <!--
    Chart.js loaded from cdnjs — no build step, no npm, no bundler.
    The `crossorigin` attribute is required so the browser applies the
    SRI check (if added later) and avoids a Tainting issue for canvas exports.
  -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"
          crossorigin="anonymous"
          referrerpolicy="no-referrer"></script>

  <style>
    /* ── Reset ──────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Design tokens — GitHub-dark-inspired palette ───────────────────── */
    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --border:   #30363d;
      --text:     #c9d1d9;
      --muted:    #8b949e;
      --accent:   #58a6ff;
      --green:    #3fb950;
      --red:      #f85149;
      --yellow:   #d29922;
      --blue:     #58a6ff;
      --radius:   8px;
    }

    /* ── Base ────────────────────────────────────────────────────────────── */
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    header h1 {
      font-family: monospace;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--accent);
    }

    header .tagline {
      font-size: 0.82rem;
      color: var(--muted);
    }

    /* ── Main layout ─────────────────────────────────────────────────────── */
    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ── Input row ──────────────────────────────────────────────────────── */
    .input-row {
      display: flex;
      gap: 8px;
    }

    .input-row input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      color: var(--text);
      font-family: monospace;
      font-size: 0.9rem;
      outline: none;
      /* Transition makes the focus ring feel responsive, not jumpy. */
      transition: border-color 0.15s;
    }

    .input-row input:focus { border-color: var(--accent); }
    .input-row input::placeholder { color: var(--muted); }

    button {
      background: var(--accent);
      color: #0d1117;
      border: none;
      border-radius: var(--radius);
      padding: 10px 22px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }

    button:hover:not(:disabled) { opacity: 0.85; }

    /* `disabled` state is set via JS while the fetch is in-flight. */
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Loading indicator ─────────────────────────────────────────────── */
    /*
      Hidden by default; JS toggles `.visible` to show it.
      Using a class toggle (not display:none → display:flex directly)
      avoids a layout recalc on every state change.
    */
    .loading {
      display: none;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 0.88rem;
    }
    .loading.visible { display: flex; }

    .spinner {
      width: 17px;
      height: 17px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      /* Single animation declaration — the browser composes this cheaply. */
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error box ─────────────────────────────────────────────────────── */
    .error-box {
      display: none;
      background: #2d1316;      /* dark red surface — no color-mix() for wider support */
      border: 1px solid #6e1f23;
      border-radius: var(--radius);
      padding: 14px 16px;
      color: var(--red);
      font-size: 0.9rem;
      font-family: monospace;
      white-space: pre-wrap;    /* preserve server error messages as-is */
    }
    .error-box.visible { display: block; }

    /* ── Results container ─────────────────────────────────────────────── */
    /*
      Hidden until the first successful response so there is no empty-state
      flash on page load. We use a wrapper element (not individual card
      display toggles) so a single class change reveals everything at once.
    */
    #results {
      display: none;
      flex-direction: column;
      gap: 24px;
    }
    #results.visible { display: flex; }

    /* ── Cards ─────────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
    }

    .card-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* ── History bar ────────────────────────────────────────────────────── */
    /*
      Hidden by default; JS shows it once there is at least one stored result.
      `display: none` → `display: flex` is toggled via JS (not a class) so the
      bar disappears entirely when the results list is empty.
    */
    .history-bar {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .history-bar label {
      font-size: 0.85rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .history-bar select {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 10px;
      color: var(--text);
      font-size: 0.9rem;
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s;
    }

    .history-bar select:focus { border-color: var(--accent); }

    /* ── Issue triage cards ─────────────────────────────────────────────── */
    .issue-card {
      border-left: 4px solid;
      padding: 12px 16px;
      margin-bottom: 12px;
      border-radius: 4px;
      background: rgba(255,255,255,0.05);
    }

    .issue-critical { border-color: #ef4444; }
    .issue-warning  { border-color: #f59e0b; }
    .issue-info     { border-color: #3b82f6; }

    .badge {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 2px 8px;
      border-radius: 99px;
      margin-right: 8px;
    }

    .issue-critical .badge { background: #ef4444; color: white; }
    .issue-warning  .badge { background: #f59e0b; color: black; }
    .issue-info     .badge { background: #3b82f6; color: white; }

    .action {
      color: #9ca3af;
      font-size: 0.9rem;
      margin-top: 6px;
    }

    .evidence-toggle {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.78rem;
      padding: 2px 8px;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 8px;
    }
    .evidence-toggle:hover { color: var(--text); border-color: var(--text); }

    .evidence-block {
      margin-top: 8px;
      padding: 10px 12px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 0.78rem;
      color: var(--muted);
      white-space: pre-wrap;
      word-break: break-all;
      overflow-x: auto;
    }

    /* ── Raw / empty fallbacks ──────────────────────────────────────────── */
    .raw-fallback {
      background: #1f1a02;
      border: 1px solid #5a4a00;
      border-radius: var(--radius);
      padding: 14px 16px;
      color: var(--yellow);
      font-size: 0.88rem;
      white-space: pre-wrap;
    }

    .raw-fallback-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
      opacity: 0.7;
    }

    .no-issues {
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* ── Stat row ──────────────────────────────────────────────────────── */
    .stats-row {
      display: grid;
      /* auto-fit collapses empty columns on narrow viewports automatically. */
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
    }

    .stat-value {
      font-size: 2.2rem;
      font-weight: 700;
      font-family: monospace;
      line-height: 1;
      margin-bottom: 6px;
    }

    /* Colour variants applied by JS based on the value. */
    .stat-value.red   { color: var(--red); }
    .stat-value.green { color: var(--green); }
    .stat-value.muted { color: var(--muted); }

    .stat-label {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ── Chart ─────────────────────────────────────────────────────────── */
    .chart-wrap {
      position: relative;
      /*
        Fixed height + maintainAspectRatio:false (set in Chart.js options)
        lets the chart fill exactly this box regardless of canvas width.
      */
      height: 280px;
    }
  </style>
</head>

<body>
  <header>
    <h1>log-lens</h1>
    <span class="tagline">AI-powered log analysis</span>
  </header>

  <main>

    <!-- ── Previous analyses dropdown ─────────────────────────────────── -->
    <!--
      Hidden until JS confirms at least one stored result exists.
      Selecting an entry loads it from GET /api/results/:id without re-running
      the full analysis pipeline.
    -->
    <div class="history-bar" id="history-bar">
      <label for="history-select">Previous analyses</label>
      <select id="history-select">
        <option value="">— select a past result —</option>
      </select>
    </div>

    <!-- ── Log file path input ─────────────────────────────────────────── -->
    <!--
      A text field (not a file picker) because the server reads the path
      directly from disk — the browser never transfers the file contents.
    -->
    <div class="input-row">
      <input
        id="file-input"
        type="text"
        placeholder="samples/apache-access.log"
        value="samples/apache-access.log"
        autocomplete="off"
        spellcheck="false"
      />
      <button id="submit-btn" onclick="analyse()">Analyse</button>
    </div>

    <!-- ── Loading indicator ───────────────────────────────────────────── -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <span>Analysing log file…</span>
    </div>

    <!-- ── Error display ───────────────────────────────────────────────── -->
    <div class="error-box" id="error-box"></div>

    <!-- ── Results (hidden until first successful response) ────────────── -->
    <div id="results">

      <!-- AI analysis — most prominent element, top of the results -->
      <div class="card">
        <div class="card-label">AI Analysis</div>
        <div id="issue-list" class="issue-list"></div>
      </div>

      <!-- Numeric summary stats -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-value" id="error-rate-value">—</div>
          <div class="stat-label">Error rate (5xx)</div>
        </div>
        <div class="stat-card">
          <div class="stat-value muted" id="total-value">—</div>
          <div class="stat-label">Total records</div>
        </div>
      </div>

      <!-- Status code distribution chart -->
      <div class="card">
        <div class="card-label">Status Code Distribution</div>
        <div class="chart-wrap">
          <canvas id="status-chart"></canvas>
        </div>
      </div>

    </div><!-- #results -->
  </main>

  <script>
    /*
      `chart` is kept at module scope so we can call `.destroy()` before
      creating a new chart on the same canvas. Without this, Chart.js
      stacks multiple chart instances on one canvas and logs a warning.
    */
    let chart = null;

    /* ── History dropdown ─────────────────────────────────────────────── */

    /*
      Fetches the stored result list and rebuilds the <select> options.
      If autoSelectId is provided, the matching option is selected after rebuild.
      If the list is empty the history bar is hidden entirely.
      Errors are swallowed — history is non-critical and must never block the UI.
    */
    async function loadHistory(autoSelectId = null) {
      try {
        const res = await fetch('/api/results');
        if (!res.ok) return;
        const results = await res.json();

        const bar = document.getElementById('history-bar');
        const sel = document.getElementById('history-select');

        if (results.length === 0) {
          bar.style.display = 'none';
          return;
        }

        bar.style.display = 'flex';

        // Remember the previously-selected value so re-populating the list
        // does not silently lose the user's current selection.
        const prevValue = autoSelectId != null ? String(autoSelectId) : sel.value;

        sel.innerHTML = '<option value="">— select a past result —</option>';

        for (const r of results) {
          const dt = new Date(r.analysed_at);
          const label =
            `${r.filename} — ${dt.toLocaleDateString()} ${dt.toLocaleTimeString()}`;
          const opt = document.createElement('option');
          opt.value = String(r.id);
          opt.textContent = label;
          sel.appendChild(opt);
        }

        // Restore (or set) the desired selection.
        if (prevValue) sel.value = prevValue;
      } catch (_) {
        // Silently ignore — history is non-critical.
      }
    }

    // When the user picks a past result, fetch its detail and render it.
    document.getElementById('history-select')
      .addEventListener('change', async function () {
        const id = this.value;
        if (!id) return;

        setLoading(true);
        clearError();
        hideResults();

        try {
          const res = await fetch(`/api/results/${id}`);
          if (!res.ok) {
            const msg = await res.text();
            throw new Error(`Could not load result ${id}: ${msg}`);
          }
          // StoredResultDetail has { summary, analysis } — same shape as the
          // fresh-analysis response, so render() reuses without modification.
          render(await res.json());
        } catch (err) {
          showError(err.message);
        } finally {
          setLoading(false);
        }
      });

    // Populate the dropdown as soon as the page loads.
    loadHistory();

    /* ── Main action ──────────────────────────────────────────────────── */

    async function analyse() {
      const path = document.getElementById('file-input').value.trim();
      if (!path) return;

      setLoading(true);
      clearError();
      hideResults();

      try {
        /*
          encodeURIComponent converts '/' → '%2F' so path separators survive
          the query string intact. Axum's Query extractor percent-decodes the
          value before handing it to the handler, so the server sees the
          original path with real slashes.
        */
        const url = `/api/summary?file=${encodeURIComponent(path)}`;
        const res = await fetch(url);

        if (!res.ok) {
          /*
            Read the plain-text body the server sends on error (AppError
            returns the anyhow message as the body, not JSON).
          */
          const msg = await res.text();
          throw new Error(`Server returned ${res.status}: ${msg}`);
        }

        const data = await res.json();
        render(data);

        // Refresh the history dropdown and auto-select the newest entry.
        // Because the list is ordered newest-first, the first non-placeholder
        // option is always the result we just saved.
        await loadHistory();
        const sel = document.getElementById('history-select');
        if (sel.options.length > 1) sel.value = sel.options[1].value;

      } catch (err) {
        showError(err.message);
      } finally {
        /*
          `finally` runs whether the fetch succeeded or failed, so the
          button is always re-enabled — no way to get stuck in loading state.
        */
        setLoading(false);
      }
    }

    /* ── Render ───────────────────────────────────────────────────────── */

    function render(data) {
      const { summary, analysis } = data;

      // --- Triage issue cards ---
      renderIssues(analysis);

      // --- Error rate stat ---
      const pct = (summary.error_rate * 100).toFixed(1) + '%';
      const errEl = document.getElementById('error-rate-value');
      errEl.textContent = pct;
      /*
        Ternary picks the colour class: red draws attention when there are
        server errors; green gives positive confirmation when there are none.
      */
      errEl.className = 'stat-value ' + (summary.error_rate > 0 ? 'red' : 'green');

      // --- Total records stat ---
      /*
        toLocaleString() formats with thousands separators using the user's
        locale, so 123456 becomes "123,456" in en-US or "123.456" in de-DE.
      */
      document.getElementById('total-value').textContent =
        summary.total.toLocaleString();

      // --- Chart ---
      renderChart(summary.status_counts);

      // Reveal the results section now that all fields are populated.
      document.getElementById('results').classList.add('visible');
    }

    function renderIssues(analysis) {
      const container = document.getElementById('issue-list');
      container.innerHTML = '';

      if (analysis.issues && analysis.issues.length > 0) {
        // One card per issue; server orders them critical-first already.
        for (const issue of analysis.issues) {
          const sev = issue.severity || 'info';
          const card = document.createElement('div');
          card.className = `issue-card issue-${sev}`;
          card.innerHTML =
            `<span class="badge">${escHtml(sev)}</span>` +
            `<strong>${escHtml(issue.title)}</strong>` +
            `<p>${escHtml(issue.explanation)}</p>` +
            `<p class="action">→ ${escHtml(issue.action)}</p>`;

          // Evidence toggle — only rendered when sample lines are present.
          const lines = issue.evidence || [];
          if (lines.length > 0) {
            const btn = document.createElement('button');
            btn.className = 'evidence-toggle';
            btn.textContent = `Show evidence (${lines.length} line${lines.length > 1 ? 's' : ''})`;
            const pre = document.createElement('pre');
            pre.className = 'evidence-block';
            pre.hidden = true;
            pre.textContent = lines.join('\n');
            btn.addEventListener('click', () => {
              const showing = !pre.hidden;
              pre.hidden = showing;
              btn.textContent = showing
                ? `Show evidence (${lines.length} line${lines.length > 1 ? 's' : ''})`
                : `Hide evidence`;
            });
            card.appendChild(btn);
            card.appendChild(pre);
          }

          container.appendChild(card);
        }
      } else if (analysis.raw) {
        // The server couldn't parse the LLM response as AnalysisResult, but
        // the raw string may still be valid JSON with an issues array — try
        // parsing it before falling back to the plain-text display.
        let parsed = null;
        try {
          const cleaned = analysis.raw
            .replace(/^```json\s*/i, '')
            .replace(/```\s*$/, '')
            .trim();
          parsed = JSON.parse(cleaned);
        } catch (_) {}

        if (parsed && Array.isArray(parsed.issues) && parsed.issues.length > 0) {
          renderIssues({ issues: parsed.issues });
        } else {
          const box = document.createElement('div');
          box.className = 'raw-fallback';
          const label = document.createElement('div');
          label.className = 'raw-fallback-label';
          label.textContent = 'Unstructured response';
          const body = document.createElement('div');
          body.textContent = analysis.raw;
          box.appendChild(label);
          box.appendChild(body);
          container.appendChild(box);
        }
      } else {
        // Both empty — positive confirmation that the log is clean.
        const msg = document.createElement('p');
        msg.className = 'no-issues';
        msg.textContent = 'No issues detected.';
        container.appendChild(msg);
      }
    }

    /*
      Escape HTML special characters before inserting user-originated or
      LLM-originated text into innerHTML to prevent accidental XSS.
    */
    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function renderChart(statusCounts) {
      /*
        Sort labels numerically (HTTP codes are integers) so the bars always
        read left-to-right in ascending order: 200, 301, 404, 500, …
        JSON key order is not guaranteed, so we sort explicitly.
      */
      const labels = Object.keys(statusCounts).sort((a, b) => +a - +b);
      const values = labels.map(k => statusCounts[k]);

      /*
        Assign a colour based on HTTP status class so the chart is
        immediately readable without a legend:
          2xx → green  (success)
          3xx → blue   (redirect)
          4xx → yellow (client error)
          5xx → red    (server error)
      */
      const colors = labels.map(code => {
        const n = parseInt(code, 10);
        if (n < 300) return '#3fb950';
        if (n < 400) return '#58a6ff';
        if (n < 500) return '#d29922';
        return '#f85149';
      });

      // Destroy the previous instance so Chart.js doesn't accumulate
      // hidden canvases and leak tooltip/animation state between analyses.
      if (chart) chart.destroy();

      const ctx = document.getElementById('status-chart').getContext('2d');
      chart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            label: 'Requests',
            data: values,
            backgroundColor: colors,
            borderRadius: 4,
            // `borderSkipped: false` applies the border-radius to all four
            // corners of each bar, including the base — looks cleaner on dark bg.
            borderSkipped: false,
          }],
        },
        options: {
          responsive: true,
          /*
            `maintainAspectRatio: false` lets the canvas fill the .chart-wrap
            height (set in CSS) rather than enforcing Chart.js's default 2:1
            width-to-height ratio, which would make the chart too short.
          */
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                // Prefix "HTTP" so tooltips read "HTTP 200" not just "200".
                title: items => `HTTP ${items[0].label}`,
              },
            },
          },
          scales: {
            x: {
              ticks: { color: '#8b949e' },
              grid:  { color: '#21262d' },
            },
            y: {
              ticks:       { color: '#8b949e', precision: 0 },
              grid:        { color: '#21262d' },
              /*
                `beginAtZero` anchors the y-axis at 0 even when all counts
                are large. Without it, Chart.js may auto-scale in a way that
                exaggerates small differences between bars.
              */
              beginAtZero: true,
            },
          },
        },
      });
    }

    /* ── UI state helpers ─────────────────────────────────────────────── */

    function setLoading(on) {
      document.getElementById('loading').classList.toggle('visible', on);
      // Disable the button while loading to prevent duplicate submissions.
      document.getElementById('submit-btn').disabled = on;
    }

    function showError(msg) {
      const el = document.getElementById('error-box');
      el.textContent = msg;
      el.classList.add('visible');
    }

    function clearError() {
      document.getElementById('error-box').classList.remove('visible');
    }

    function hideResults() {
      document.getElementById('results').classList.remove('visible');
    }

    /* ── Keyboard shortcut ────────────────────────────────────────────── */

    /*
      Submitting with Enter makes the workflow feel like a terminal —
      natural for a developer tool where the user expects keyboard-driven UX.
    */
    document.getElementById('file-input')
      .addEventListener('keydown', e => { if (e.key === 'Enter') analyse(); });
  </script>
</body>
</html>
